# Application configuration settings

# File paths (relative to script location)
paths:
  output_directory: "../optimize_transcription/output"
  summarized_directory: "../summarized_entries"
  summarized_prefix: ""  # Will be prepended with date in format YYYY-MM-DD
  file_pattern: "*_ongoing_entries*.txt"
  

# Logging configuration
logging:
  log_file: "app.log"
  max_size_bytes: 1048576  # 1 MB
  backup_count: 3
  log_level: "INFO"
  
  # OpenAI usage log configuration
  openai_usage_log_file: "openai_usage.log"
  openai_usage_max_size_bytes: 1048576  # 1 MB
  openai_usage_backup_count: 3

# Output file configuration
output:
  date_format: "%Y-%m-%d"
  file_extension: "txt"
  timestamp_format: "%Y-%m-%d_%H-%M-%S"  # Format for summarized entries files
  summarized_suffix: "journal"  # Suffix to use for summarized files 